# One-shot: copy Telegram secrets to qa-guru/selenoid-tests. Delete after use.
name: copy-telegram-secrets-to-selenoid-tests

on:
  workflow_dispatch:

jobs:
  copy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Copy TELEGRAM_* to selenoid-tests
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${TELEGRAM_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "Source TELEGRAM secrets missing on allure-notifications"
            exit 1
          fi
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "CROSS_REPO_PAT missing"
            exit 1
          fi
          gh secret set TELEGRAM_BOT_TOKEN -R qa-guru/selenoid-tests --body "$TELEGRAM_TOKEN"
          gh secret set TELEGRAM_TOKEN -R qa-guru/selenoid-tests --body "$TELEGRAM_TOKEN"
          gh secret set TELEGRAM_CHAT_ID -R qa-guru/selenoid-tests --body "$TELEGRAM_CHAT_ID"
          echo "Copied TELEGRAM_* secrets to qa-guru/selenoid-tests"
